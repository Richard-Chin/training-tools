<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1080px;height:1350px;overflow:hidden}
  body{
    font-family:"Noto Sans TC","Microsoft JhengHei","PingFang TC",sans-serif;
    background:linear-gradient(160deg,#0e5a3f 0%,#1a7a55 55%,#22936a 100%);
    color:#fff;padding:100px 84px;display:flex;flex-direction:column;
  }
  .kicker{font-size:34px;letter-spacing:.06em;color:#c9f3dd;font-weight:800;margin-bottom:30px}
  h1{font-size:82px;line-height:1.24;font-weight:900}
  h1 .hl{color:#ffe27a}
  .subtitle{font-size:38px;color:#d9f5e6;margin-top:34px;line-height:1.5;font-weight:500}
  .icons{display:flex;gap:26px;margin-top:70px}
  .icon{flex:1;background:rgba(255,255,255,.12);border-radius:30px;padding:40px 20px;text-align:center}
  .icon .e{font-size:78px;line-height:1}
  .icon .l{font-size:33px;font-weight:800;margin-top:20px;color:#fff}
  .arrowline{text-align:center;font-size:56px;margin:34px 0 10px;color:#ffe27a}
  .result{background:#ffe27a;color:#123;border-radius:30px;padding:44px 40px;text-align:center;
    font-size:46px;font-weight:900;line-height:1.4}
  .result b{color:#8a5a00}
  .cta{margin-top:auto;padding-top:50px;display:flex;align-items:center;justify-content:space-between}
  .cta .t{font-size:44px;font-weight:900}
  .cta .t small{display:block;font-size:30px;color:#ffe27a;font-weight:700;margin-top:8px}
  .cta .arrow{font-size:60px}
</style>
</head>
<body>
  <div class="kicker">🌱 分享一個我很喜歡的觀念</div>
  <h1>把健康顧好，<br>其實會<span class="hl">有回饋</span></h1>
  <div class="subtitle">不只是對自己好，<br>連「準備」都可以更划算。</div>

  <div class="icons">
    <div class="icon"><div class="e">🩺</div><div class="l">定期健檢</div></div>
    <div class="icon"><div class="e">💉</div><div class="l">該打的疫苗</div></div>
    <div class="icon"><div class="e">🏃</div><div class="l">規律運動</div></div>
  </div>
  <div class="arrowline">⌄</div>
  <div class="result">顧好自己，<b>還能換到回饋</b> 😄</div>

  <div class="cta">
    <div class="t">想知道怎麼回事？<small>私訊敲我，傳懶人包給你</small></div>
    <div class="arrow">👉</div>
  </div>
</body>
</html>
